metricProviders:
  # описание конкретной имплиментации провайдера, например асика
  # all id's generated by backend
  - name: asik_seregi
    type: ASIC
    address: 192.168.3.20
    port: 4028
    model: "antminer s19 pro hydro"
    vendor: "bitmain"
    user: admin
    password: admin
  - name: tempSensor1
    type: TemperatureSensor
    pin: A0
  - name: tempSensor2
    type: TemperatureSensor
    pin: A1


metricAggregators: # только VirtualMetricProviderAggregated

conditions: # надо сделать конкретный обьект, тут он будет вдит гвоздями
  # all id's generated by backend
  - name: asic_condition
    input: asik_seregi
    metricName: tempC
    type: ">"
    value: 58
  - name: tempSensor1Condition
    input: tempSensor1
    metricName: tempC
    type: "<"
    value: 52
  - name: tempSensor2Condition
    input: tempSensor2
    metricName: tempC
    type: "<"
    value: 45
  - name: seregeZharko
    input: tempSensor2
    metricName: tempC
    type: ">"
    value: 25

alerts:    # сейм что с кондишоном
  # all id's generated by backend
  - name: AsicAlertTemp
    input: asik_seregi
    metricName: tempC
    type: ">"
    value: 60
  - name: AsicAlertHR
    input: asik_seregi
    metricName: hashrate
    type: "<="
    value: 10
  - name: tempSensor1Alert1
    input: tempSensor1
    metricName: tempC
    type: ">"
    value: 65
  - name: tempSensor1Alert2
    input: tempSensor1
    metricName: tempC
    type: "<"
    value: 1
  - name: tempSensor2Alert1
    input: tempSensor2
    metricName: tempC
    type: ">"
    value: 65
  - name: tempSensor2Alert2
    input: tempSensor2
    metricName: tempC
    type: "<"
    value: 1

conditionGrouping: # онли ноды
  - name: asikCooling
    type: OR
    input: [seregeZharko, asic_condition]

actuators:
  # описание конкретной имплементации, например клапан байпасс
  # all id's generated by backend
  - name: asic_control
    input: asikCooling
    type: Valve
    pin: 3
  - name: temp1SensControl
    input: tempSensor1Condition
    type: BypassValve
    pinOn: 5
    pinOff: 7
  - name: temp2SensControl
    input: tempSensor2Condition
    type: BypassValve
    pinOn: 5
    pinOff: 7
mqlTimeOut: 10