metricProviders:
  # описание конкретной имплиментации провайдера, например асика
  # all id's generated by backend
  - name: ASIC1
    type: ASICMock
    address: 192.168.3.13
    port: 4028
    model: default
    user: admin
    password: admin
  - name: TempPin1
    type: TemperatureSensorMock
    pin: "A1"
  - name: ASIC2
    type: ASICMock
    address: 192.168.3.14
    port: 4028
    model: default
    user: admin
    password: admin


metricAggregators: # только VirtualMetricProviderAggregated
  # internal id generation
  - name: AsicTempAggregator # out ID
    input: [ASIC1, ASIC2]
    type: avg
    metricName: tempC

conditions: # надо сделать конкретный обьект, тут он будет вдит гвоздями
  # all id's generated by backend
  - name: TempPinCondition
    input: TempPin1
    metricName: tempC
    type: ">="
    value: 70
  - name: AsicTempCondition
    input: AsicTempAggregator
    metricName: tempC
    type: ">="
    value: 70

alerts:    # сейм что с кондишоном
  # all id's generated by backend
  - name: AsicAlert
    input: AsicTempAggregator
    metricName: tempC
    type: ">="
    value: 60

conditionGrouping: # онли ноды
  # all id's are internal
  - name: conditionsOR
    type: OR
    input: [TempPinCondition, AsicTempCondition]

actuators:
  # описание конкретной имплементации, например клапан байпасс
  # all id's generated by backend
  - name: PIN10
    input: conditionsOR
    type: BypassValveMock

mqlTimeOut: 10